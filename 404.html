<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - ¡Página Eliminada!</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>

    <!-- Latest compiled and minified CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Latest compiled JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Impact', 'Arial Black', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .ring-card {
            max-width: 550px;
            width: 100%;
            background-color: #181818;
            border: 4px solid #e50914; /* Rojo vibrante */
            border-radius: 12px;
            padding: 40px 25px;
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.4);
        }

        .error-code {
            font-size: 6rem;
            color: #ffcc00; /* Dorado campeonato */
            text-shadow: 4px 4px 0px #e50914;
            line-height: 1;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: #fff;
        }

        p {
            font-family: Arial, sans-serif;
            font-size: 1rem;
            color: #bbb;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            background-color: #e50914;
            color: #ffffff;
            padding: 14px 28px;
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 6px;
            text-transform: uppercase;
            transition: all 0.2s ease-in-out;
        }

        .btn-home:hover {
            background-color: #ffcc00;
            color: #0d0d0d;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="ring-card">
        <div class="error-code">404</div>
        <h1>¡FUERA DE LA TERCERA CUERDA!</h1>
        <p>Parece que esta página recibió una <em>Superkick</em> y desapareció del mapa. El árbitro ya contó hasta 3 y no hay vuelta atrás.</p>
        <a href="index.html" class="btn-home">Volver al Ring Principal</a>
    </div>

</body>
</html>
